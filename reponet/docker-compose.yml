# Docker Compose for Reponet development environment
# Usage: docker compose up

services:
  # Phoenix application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Persist deps and build artifacts
      - deps:/app/deps
      - build:/app/_build
      - node_modules:/app/assets/node_modules
    environment:
      - MIX_ENV=dev
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=reponet_dev
      - REDIS_HOST=redis
      - PHX_HOST=localhost
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Enable stdin for IEx
    stdin_open: true
    tty: true
    command: >
      sh -c "mix ecto.create && mix ecto.migrate && mix phx.server"

  # PostgreSQL database
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=reponet_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for background jobs and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Cloudflare Tunnel placeholder
  # Configure this with your tunnel credentials for production
  tunnel:
    image: cloudflare/cloudflared:latest
    # Uncomment and configure when ready to expose publicly
    # command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    command: ["sleep", "infinity"]
    profiles:
      - tunnel
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  deps:
  build:
  node_modules:
